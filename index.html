
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ausbildung Maroc</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f8fafc;
color:#222;
}

header{
background:#0f172a;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:#fff;
font-size:28px;
font-weight:800;
}

.logo span{
color:#facc15;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-weight:600;
transition:.3s;
}

nav a:hover{
color:#facc15;
}

.hero{
min-height:90vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px;
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
url('https://images.unsplash.com/photo-1467269204594-9661b134dd2b?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
}

.hero-content{
max-width:900px;
color:white;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
font-size:22px;
line-height:1.8;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:15px 35px;
background:#facc15;
color:#111;
text-decoration:none;
border-radius:50px;
font-weight:700;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
}

.stats{
padding:60px 8%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
background:white;
}

.stat{
text-align:center;
}

.stat h2{
font-size:42px;
color:#2563eb;
}

.stat p{
color:#555;
}

.section-title{
text-align:center;
font-size:40px;
margin:70px 0 40px;
}

.cards{
padding:0 8% 80px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card h3{
font-size:24px;
margin-bottom:15px;
color:#2563eb;
}

.card p{
line-height:1.8;
color:#555;
}

footer{
background:#0f172a;
padding:40px;
text-align:center;
color:white;
}

@media(max-width:768px){

.hero h1{
font-size:38px;
}

.hero p{
font-size:18px;
}

header{
flex-direction:column;
gap:15px;
}

nav{
text-align:center;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
Ausbildung <span>Maroc</span>
</div>

<nav>
<a href="#">الرئيسية
